name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node & npm
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install uv (for Python/Maturin)
        uses: astral-sh/setup-uv@v2

      - name: Install Zig (Required for cross-compiling aarch64 and musl on x86 runners)
        if: runner.os == 'Linux'
        run: |
          npm install -g @ziglang/cli
          
      - name: Install cargo-zigbuild (for MUSL python wheels)
        if: contains(matrix.target, 'musl')
        run: cargo install cargo-zigbuild

      - name: Build Target
        run: ./scripts/build.sh ${{ matrix.target }}
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            *.node
            dist/*.whl

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Publish Tagged Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.node
            artifacts/dist/*.whl
          generate_release_notes: true
          draft: false
          
      - name: Update Latest Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: |
            artifacts/*.node
            artifacts/dist/*.whl
          prerelease: true
          # This forces the action to overwrite the existing "latest" tag and replace its files
          make_latest: false
